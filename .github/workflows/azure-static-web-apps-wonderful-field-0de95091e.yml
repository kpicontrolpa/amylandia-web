name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Locate project (.csproj)
        shell: bash
        run: |
          set -e

          # Simplemente busca el archivo .csproj en el checkout, excluyendo explícitamente rutas problemáticas si las hubiera
          CSPROJ=$(find . -name "*.csproj" -not -path "*/bin/*" -not -path "*/obj/*" -not -path "*/.git/*" | head -n 1)

          if [ -z "$CSPROJ" ]; then
            echo "ERROR: No se encontró ningún .csproj en el repo."
            exit 1
          fi

          echo "CSPROJ=$CSPROJ" >> $GITHUB_ENV
          echo "PROJECT_DIR=$(dirname "$CSPROJ")" >> $GITHUB_ENV
          echo "Proyecto detectado: $CSPROJ"

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WONDERFUL_FIELD_0DE95091E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/" # Raíz del repositorio donde está el .csproj
          api_location: ""
          output_location: "wwwroot" # El .net 8 publish suelta el WASM en wwwroot

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WONDERFUL_FIELD_0DE95091E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "close" # cierre de PR




